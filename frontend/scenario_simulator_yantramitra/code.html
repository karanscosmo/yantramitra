<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
<title>YantraMitra | Digital Twin Simulator</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&family=Geist:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { "colors": { "on-primary-fixed": "#09006b","on-tertiary": "#ffffff","primary-fixed-dim": "#c1c1ff","secondary-container": "#5efae4","on-background": "#191a28","outline": "#767586","on-primary-container": "#f6f2ff","inverse-on-surface": "#f1efff","on-secondary-fixed": "#00201c","inverse-surface": "#2e2f3e","surface-variant": "#e2e1f4","on-tertiary-fixed": "#291800","on-surface-variant": "#464555","tertiary-container": "#986500","surface": "#fbf8ff","tertiary": "#774f00","on-primary": "#ffffff","secondary-fixed": "#5efae4","on-secondary-fixed-variant": "#005047","surface-tint": "#4948de","on-secondary": "#ffffff","surface-bright": "#fbf8ff","surface-container": "#eeecff","secondary-fixed-dim": "#36ddc8","on-tertiary-container": "#fff2e5","on-secondary-container": "#007165","tertiary-fixed-dim": "#ffba4b","on-primary-fixed-variant": "#2e29c6","error": "#ba1a1a","surface-container-high": "#e8e6fa","surface-container-highest": "#e2e1f4","tertiary-fixed": "#ffddb1","surface-container-low": "#f4f2ff","on-surface": "#191a28","on-error": "#ffffff","secondary": "#006b5f","primary-container": "#5b5bf0","on-error-container": "#93000a","primary": "#413fd6","inverse-primary": "#c1c1ff","surface-dim": "#d9d8ec","error-container": "#ffdad6","surface-container-lowest": "#ffffff","outline-variant": "#c7c4d7","background": "#fbf8ff","primary-fixed": "#e1dfff","on-tertiary-fixed-variant": "#624000" }, "borderRadius": { "DEFAULT": "0.25rem","lg": "0.5rem","xl": "0.75rem","full": "9999px" }, "fontFamily": { "display-hero": ["Geist"],"section-header": ["Geist"],"kpi-numeric": ["Space Grotesk"],"headline-lg": ["Geist"],"body-md": ["Inter"],"headline-lg-mobile": ["Geist"],"label-caps": ["Space Grotesk"] }, "fontSize": { "display-hero": ["56px", {"lineHeight": "64px", "letterSpacing": "-0.02em", "fontWeight": "700"}],"section-header": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],"kpi-numeric": ["20px", {"lineHeight": "24px", "letterSpacing": "0.02em", "fontWeight": "600"}],"headline-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.01em", "fontWeight": "700"}],"body-md": ["15px", {"lineHeight": "24px", "fontWeight": "400"}],"headline-lg-mobile": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],"label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}] } }, }, }
    </script>
<style>
body { background-color: #fbf8ff; overflow-x: hidden; }
.glass-panel { background: rgba(255,255,255,0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid #E7E9F5; box-shadow: 0 8px 32px 0 rgba(65,63,214,0.05); }
.shimmer-btn { position: relative; overflow: hidden; background: linear-gradient(135deg, #5B5BF0, #7C7CFA); transition: all 0.3s ease; }
.shimmer-btn:hover::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent); transform: rotate(45deg); animation: shimmer 1s ease-in-out; }
@keyframes shimmer { 0% { transform: translate(-100%, -100%) rotate(45deg); } 100% { transform: translate(100%, 100%) rotate(45deg); } }
input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; }
input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #e1dfff; border-radius: 2px; }
input[type="range"]::-webkit-slider-thumb { height: 16px; width: 16px; border-radius: 50%; background: #413fd6; cursor: pointer; -webkit-appearance: none; margin-top: -6px; box-shadow: 0 0 10px rgba(65,63,214,0.4); }
.floating-rail { z-index: 100; }
.chart-bar { transition: height .5s ease; }
.modal-backdrop { position: fixed; inset: 0; z-index: 100; background: rgba(25,26,40,0.36); display: flex; align-items: center; justify-content: center; padding: 18px; }
.modal-card { width: min(680px, calc(100vw - 32px)); max-height: min(80vh, 680px); overflow-y: auto; border-radius: 18px; border: 1px solid rgba(199,196,215,0.72); background: rgba(255,255,255,0.96); box-shadow: 0 30px 90px rgba(25,26,40,0.28); padding: 20px; }
.custom-scrollbar::-webkit-scrollbar { width: 4px; }
.custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #c7c4d7; border-radius: 10px; }
</style>
</head>
<body class="font-body-md text-on-surface">
<main class="pt-16 h-screen flex overflow-hidden">
<section class="w-3/5 h-full relative overflow-hidden bg-surface-container-low" id="ym-scene-container">
<div class="absolute inset-0 z-0" id="ym-scene-bg"></div>
<div class="absolute top-8 left-8 space-y-4 z-10">
<div class="glass-panel px-4 py-2 rounded-lg inline-flex items-center space-x-3">
<div class="flex items-center space-x-1"><span class="w-2 h-2 rounded-full bg-secondary animate-pulse" id="ym-sim-indicator"></span><span class="font-label-caps text-secondary text-[10px]" id="ym-sim-status">SIMULATION READY</span></div>
<div class="h-4 w-px bg-outline-variant/50"></div><span class="font-kpi-numeric text-on-surface text-sm" id="ym-iteration">Iteration #0</span>
</div>
</div>
<div class="absolute bottom-6 left-6 right-6 z-10" id="ym-plant-switcher"></div>
<div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-10 flex items-center gap-4" id="ym-sim-controls">
<div class="glass-panel p-1.5 rounded-full flex space-x-1 shadow-lg">
<button class="px-4 py-2 rounded-full bg-primary text-white font-label-caps flex items-center space-x-2 transition-all" id="ym-sim-run"><span class="material-symbols-outlined text-sm">play_arrow</span><span>RUN</span></button>
<button class="px-4 py-2 rounded-full text-on-surface-variant font-label-caps flex items-center space-x-2 hover:bg-primary/5 transition-all" id="ym-sim-pause"><span class="material-symbols-outlined text-sm">pause</span><span>PAUSE</span></button>
<button class="px-4 py-2 rounded-full text-on-surface-variant font-label-caps flex items-center space-x-2 hover:bg-primary/5 transition-all" id="ym-sim-reset"><span class="material-symbols-outlined text-sm">restart_alt</span><span>RESET</span></button>
<button class="px-4 py-2 rounded-full text-on-surface-variant font-label-caps flex items-center space-x-2 hover:bg-primary/5 transition-all" id="ym-sim-compare"><span class="material-symbols-outlined text-sm">compare_arrows</span><span>BASELINE</span></button>
<button class="px-4 py-2 rounded-full text-on-surface-variant font-label-caps flex items-center space-x-2 hover:bg-primary/5 transition-all" id="ym-sim-export"><span class="material-symbols-outlined text-sm">download</span><span>EXPORT</span></button>
<button class="px-4 py-2 rounded-full text-on-surface-variant font-label-caps flex items-center space-x-2 hover:bg-primary/5 transition-all" id="ym-sim-history"><span class="material-symbols-outlined text-sm">history</span><span>HISTORY</span></button>
</div>
</div>
<div class="absolute top-8 right-8 z-10 flex flex-col space-y-2" id="ym-scene-tools">
<button class="w-10 h-10 glass-panel rounded-full flex items-center justify-center text-primary hover:bg-primary/10 transition-all" id="ym-view-3d" title="3D View"><span class="material-symbols-outlined text-sm">view_in_ar</span></button>
<button class="w-10 h-10 glass-panel rounded-full flex items-center justify-center text-primary hover:bg-primary/10 transition-all" id="ym-view-2d" title="2D View"><span class="material-symbols-outlined text-sm">grid_view</span></button>
</div>
</section>
<section class="w-2/5 h-full flex flex-col p-4 overflow-y-auto custom-scrollbar bg-white/40 border-l border-outline-variant/30">
<div class="mb-4">
<h2 class="font-section-header text-section-header text-on-surface">Scenario Simulator</h2>
<p class="text-on-surface-variant text-body-md mt-1">Adjust parameters to predict production efficiency.</p>
</div>
<div class="mb-4 space-y-3" id="ym-sliders">
<div><div class="flex justify-between items-center"><label class="font-label-caps text-on-surface text-xs">Production Speed</label><span class="font-kpi-numeric text-primary text-sm" id="slider-speed">85%</span></div><input type="range" min="0" max="100" value="85" data-slider="speed" data-unit="%"/></div>
<div><div class="flex justify-between items-center"><label class="font-label-caps text-on-surface text-xs">Maintenance Delay</label><span class="font-kpi-numeric text-primary text-sm" id="slider-delay">12h</span></div><input type="range" min="0" max="72" value="12" data-slider="delay" data-unit="h"/></div>
<div><div class="flex justify-between items-center"><label class="font-label-caps text-on-surface text-xs">Power Load</label><span class="font-kpi-numeric text-primary text-sm" id="slider-power">420 kW</span></div><input type="range" min="100" max="1000" value="420" data-slider="power" data-unit=" kW"/></div>
<div><div class="flex justify-between items-center"><label class="font-label-caps text-on-surface text-xs">Quality Target</label><span class="font-kpi-numeric text-primary text-sm" id="slider-quality">98%</span></div><input type="range" min="80" max="100" value="98" data-slider="quality" data-unit="%"/></div>
<div><div class="flex justify-between items-center"><label class="font-label-caps text-on-surface text-xs">Operator Count</label><span class="font-kpi-numeric text-primary text-sm" id="slider-operators">12</span></div><input type="range" min="2" max="30" value="12" data-slider="operators" data-unit=""/></div>
<div><div class="flex justify-between items-center"><label class="font-label-caps text-on-surface text-xs">Raw Material Availability</label><span class="font-kpi-numeric text-primary text-sm" id="slider-material">85%</span></div><input type="range" min="0" max="100" value="85" data-slider="material" data-unit="%"/></div>
<div><div class="flex justify-between items-center"><label class="font-label-caps text-on-surface text-xs">Ambient Temperature</label><span class="font-kpi-numeric text-primary text-sm" id="slider-temp">32°C</span></div><input type="range" min="10" max="50" value="32" data-slider="temp" data-unit="°C"/></div>
<div><div class="flex justify-between items-center"><label class="font-label-caps text-on-surface text-xs">Energy Cost</label><span class="font-kpi-numeric text-primary text-sm" id="slider-energy">₹6.5/kWh</span></div><input type="range" min="2" max="15" value="65" data-slider="energy" data-unit=""/></div>
</div>
<div class="mb-4" id="ym-charts-container">
<h3 class="font-label-caps text-on-surface-variant text-xs mb-2">Projected KPIs</h3>
<div class="grid grid-cols-2 gap-2" id="ym-charts-grid"></div>
</div>
<div id="ym-ai-prediction" class="p-4 rounded-2xl bg-gradient-to-br from-primary-container to-primary relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-2xl -mr-16 -mt-16"></div>
<div class="relative z-10">
<div class="flex items-center space-x-2 mb-2"><span class="material-symbols-outlined text-white text-lg">auto_awesome</span><span class="font-label-caps text-white/90">AI Prediction</span></div>
<div id="ym-prediction-text"><p class="text-white/80 text-sm">Run simulation to generate AI prediction</p></div>
</div>
</div>
</section>
</main>
<div id="ym-toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 glass-panel rounded-full py-3 px-6 flex items-center gap-3 translate-y-32 opacity-0 transition-all duration-500 z-[100] shadow-lg">
<span class="material-symbols-outlined text-secondary">check_circle</span>
<span class="font-bold text-sm text-on-surface" id="ym-toast-msg">Action completed</span>
</div>
<script src="/js/scenario_simulator_yantramitra.js" defer></script>
<script src="/js/app_shell_yantramitra.js" defer></script>
</body></html>
