<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid #E7E9F5;
        }
        .shimmer {
            position: relative;
            overflow: hidden;
        }
        .shimmer::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg);
            transition: all 0.5s;
            opacity: 0;
        }
        .shimmer:hover::after {
            opacity: 1;
            left: 100%;
            top: 100%;
        }
        .glow-indigo { box-shadow: 0 0 15px rgba(65, 63, 214, 0.2); }
        .glow-teal { box-shadow: 0 0 15px rgba(0, 107, 95, 0.2); }
        
        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(65, 63, 214, 0.1); border-radius: 10px; }
        
        .status-pulse-teal {
            animation: pulse-teal 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-teal {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .7; transform: scale(1.1); }
        }

        .ambient-blob {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.15;
            animation: move-blobs 25s infinite alternate ease-in-out;
        }
        @keyframes move-blobs {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        @keyframes bounce {
          0%, 60%, 100% { transform: translateY(0); }
          30% { transform: translateY(-6px); }
        }
        .animate-bounce { animation: bounce 1.4s infinite ease-in-out; }
    </style>
</head>

<script>
        // Micro-interaction: Auto-scroll to bottom of chat on load
        window.addEventListener('DOMContentLoaded', () => {
            const chatStream = document.querySelector('.chat-scroll');
            chatStream.scrollTop = chatStream.scrollHeight;
        });

        // Floating blobs interaction
        document.addEventListener('mousemove', (e) => {
            const blobs = document.querySelectorAll('.ambient-blob');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            blobs.forEach((blob, index) => {
                const shift = (index + 1) * 20;
                blob.style.transform = `translate(${x * shift}px, ${y * shift}px)`;
            });
        });
    </script>
