<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>YantraMitra | Maintenance Planner</title>
<link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&family=Geist:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed": "#09006b",
                    "on-tertiary": "#ffffff",
                    "primary-fixed-dim": "#c1c1ff",
                    "secondary-container": "#5efae4",
                    "on-background": "#191a28",
                    "outline": "#767586",
                    "on-primary-container": "#f6f2ff",
                    "inverse-on-surface": "#f1efff",
                    "on-secondary-fixed": "#00201c",
                    "inverse-surface": "#2e2f3e",
                    "surface-variant": "#e2e1f4",
                    "on-tertiary-fixed": "#291800",
                    "on-surface-variant": "#464555",
                    "tertiary-container": "#986500",
                    "surface": "#fbf8ff",
                    "tertiary": "#774f00",
                    "on-primary": "#ffffff",
                    "secondary-fixed": "#5efae4",
                    "on-secondary-fixed-variant": "#005047",
                    "surface-tint": "#4948de",
                    "on-secondary": "#ffffff",
                    "surface-bright": "#fbf8ff",
                    "surface-container": "#eeecff",
                    "secondary-fixed-dim": "#36ddc8",
                    "on-tertiary-container": "#fff2e5",
                    "on-secondary-container": "#007165",
                    "tertiary-fixed-dim": "#ffba4b",
                    "on-primary-fixed-variant": "#2e29c6",
                    "error": "#ba1a1a",
                    "surface-container-high": "#e8e6fa",
                    "surface-container-highest": "#e2e1f4",
                    "tertiary-fixed": "#ffddb1",
                    "surface-container-low": "#f4f2ff",
                    "on-surface": "#191a28",
                    "on-error": "#ffffff",
                    "secondary": "#006b5f",
                    "primary-container": "#5b5bf0",
                    "on-error-container": "#93000a",
                    "primary": "#413fd6",
                    "inverse-primary": "#c1c1ff",
                    "surface-dim": "#d9d8ec",
                    "error-container": "#ffdad6",
                    "surface-container-lowest": "#ffffff",
                    "outline-variant": "#c7c4d7",
                    "background": "#fbf8ff",
                    "primary-fixed": "#e1dfff",
                    "on-tertiary-fixed-variant": "#624000"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "nav-width": "72px",
                    "lg": "40px",
                    "gutter": "24px",
                    "xl": "64px",
                    "base": "4px",
                    "sm": "16px",
                    "xs": "8px",
                    "md": "24px"
            },
            "fontFamily": {
                    "display-hero": ["Geist"],
                    "section-header": ["Geist"],
                    "kpi-numeric": ["Space Grotesk"],
                    "headline-lg": ["Geist"],
                    "body-md": ["Inter"],
                    "label-caps": ["Space Grotesk"]
            }
          }
        }
      }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid #E7E9F5;
        }
        .primary-glow {
            box-shadow: 0 0 15px rgba(65, 63, 214, 0.4);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        ::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #c7c4d7;
            border-radius: 10px;
        }
        .task-card {
            transition: all 0.2s ease;
        }
        .task-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(65, 63, 214, 0.12);
        }
        .filter-active {
            box-shadow: 0 0 0 2px #413fd6;
        }
        .priority-pill.active {
            box-shadow: 0 0 0 2px currentColor;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen overflow-hidden">
<header class="fixed top-0 w-full h-16 z-50 bg-white/70 backdrop-blur-md border-b border-outline-variant/30 flex justify-between items-center px-md shadow-[0_8px_32px_0_rgba(65,63,214,0.1)]">
<div class="flex items-center gap-sm">
<img src="/assets/logos/logo.svg" alt="YantraMitra" class="h-8 md:h-9"/>
<span class="text-on-surface-variant font-label-caps bg-surface-container px-xs py-0.5 rounded-full">PLANNER</span>
</div>

<div class="flex items-center gap-md">
<button class="p-2 text-on-surface-variant hover:bg-primary/10 rounded-full transition-colors relative">
<span class="material-symbols-outlined">notifications</span>
<span class="absolute top-2 right-2 w-2 h-2 bg-error rounded-full"></span>
</button>
<button class="p-2 text-on-surface-variant hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">factory</span>
</button>
<div class="w-8 h-8 rounded-full overflow-hidden border border-primary/20">
<img class="w-full h-full object-cover" data-alt="A professional headshot of a female industrial operations manager with a sharp, modern aesthetic." src="/assets/images/ym-operator-avatar.jpg"/>
</div>
</div>
</header>
<main class="h-screen flex">
<aside class="w-72 h-full glass-panel border-r border-outline-variant/20 p-md flex flex-col gap-md overflow-y-auto shrink-0">
<div>
<div class="flex items-center justify-between mb-sm">
<h3 class="font-label-caps text-on-surface-variant">LOCATIONS</h3>
<button class="text-[10px] font-label-caps text-primary hover:underline transition-all" id="ym-reset-locations">RESET</button>
</div>
<div class="space-y-xs" id="ym-location-filters"></div>
</div>
<div class="pt-md border-t border-outline-variant/20">
<div class="flex items-center justify-between mb-sm">
<h3 class="font-label-caps text-on-surface-variant">PRIORITY</h3>
<button class="text-[10px] font-label-caps text-primary hover:underline transition-all" id="ym-reset-priority">RESET</button>
</div>
<div class="flex flex-wrap gap-xs" id="ym-priority-filters"></div>
</div>
<div class="pt-md border-t border-outline-variant/20">
<div class="flex items-center justify-between mb-sm">
<h3 class="font-label-caps text-on-surface-variant">MAINTENANCE TYPE</h3>
<button class="text-[10px] font-label-caps text-primary hover:underline transition-all" id="ym-reset-type">RESET</button>
</div>
<div class="space-y-xs" id="ym-type-filters"></div>
</div>
<div class="pt-md border-t border-outline-variant/20 mt-auto">
<button class="w-full py-2 rounded-full border border-outline-variant/50 text-on-surface-variant font-label-caps text-[11px] hover:bg-primary/5 hover:border-primary/30 transition-all flex items-center justify-center gap-xs" id="ym-reset-all">
<span class="material-symbols-outlined text-sm">refresh</span> RESET ALL FILTERS
</button>
</div>
</aside>
<section class="flex-1 flex flex-col min-w-0 bg-white/30 relative overflow-hidden">
<div class="px-md py-sm border-b border-outline-variant/20 bg-white/60 flex items-center gap-md" id="ym-stats-row">
<div class="relative flex-1 max-w-xs">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[18px]">search</span>
<input class="w-full bg-white/70 border border-outline-variant/30 rounded-full py-1.5 pl-9 pr-3 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none text-sm" id="ym-search-input" placeholder="Search tasks..." type="text"/>
</div>
<div class="flex items-center gap-xs">
<span class="font-label-caps text-on-surface-variant text-[11px]">TOTAL TASKS</span>
<span class="font-kpi-numeric text-lg text-primary" id="ym-stat-total">0</span>
</div>
<div class="w-px h-6 bg-outline-variant/30"></div>
<div class="flex items-center gap-xs">
<span class="font-label-caps text-on-surface-variant text-[11px]">ACTIVE</span>
<span class="font-kpi-numeric text-lg text-secondary" id="ym-stat-active">0</span>
</div>
<div class="w-px h-6 bg-outline-variant/30"></div>
<div class="flex items-center gap-xs">
<span class="font-label-caps text-on-surface-variant text-[11px]">COMPLETED</span>
<span class="font-kpi-numeric text-lg text-tertiary" id="ym-stat-completed">0</span>
</div>
<div class="w-px h-6 bg-outline-variant/30"></div>
<div class="flex items-center gap-xs">
<span class="font-label-caps text-on-surface-variant text-[11px]">OVERDUE</span>
<span class="font-kpi-numeric text-lg text-error" id="ym-stat-overdue">0</span>
</div>
</div>
<div class="px-md py-sm border-b border-outline-variant/20 bg-white/20 flex items-center gap-xs" id="ym-active-filters"></div>
<div class="flex-1 overflow-auto p-md" id="ym-tasks-container">
<div class="flex flex-col items-center justify-center h-full text-on-surface-variant" id="ym-empty-state">
<span class="material-symbols-outlined text-5xl mb-sm">assignment</span>
<p class="font-label-caps text-sm">No maintenance tasks match your filters</p>
<p class="text-xs mt-1">Try adjusting your filter criteria or <button class="text-primary hover:underline cursor-pointer" id="ym-empty-reset">reset all filters</button></p>
</div>
<div class="grid grid-cols-1 gap-sm" id="ym-tasks-grid"></div>
</div>
</section>
</main>
<footer class="fixed bottom-0 left-0 right-0 h-10 px-md flex items-center justify-between border-t border-outline-variant/20 bg-transparent z-40">
<div class="flex items-center gap-md">
<span class="text-[10px] font-label-caps text-on-surface-variant">© 2024 YANTRAMITRA PLATFORM</span>
<div class="flex gap-sm">
<a class="text-[10px] font-label-caps text-on-surface-variant hover:text-primary transition-colors" href="/privacy">PRIVACY</a>
<a class="text-[10px] font-label-caps text-on-surface-variant hover:text-primary transition-colors" href="/api-status">API STATUS</a>
</div>
</div>
<div class="flex items-center gap-sm text-[10px] font-label-caps text-on-surface-variant">
<span class="w-2 h-2 rounded-full bg-secondary"></span>
            SYSTEM OPERATIONAL: LATENCY 24MS
        </div>
</footer>
<script src="/js/maintenance.js" defer></script>
<script src="/js/app-shell.js" defer></script>
</body></html>
