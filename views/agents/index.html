<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>YantraMitra | Agent Mission Control</title>
<link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@600;700&amp;family=Geist:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "on-primary-fixed": "#09006b","on-tertiary": "#ffffff","primary-fixed-dim": "#c1c1ff",
        "secondary-container": "#5efae4","on-background": "#191a28","outline": "#767586",
        "on-primary-container": "#f6f2ff","inverse-on-surface": "#f1efff","on-secondary-fixed": "#00201c",
        "inverse-surface": "#2e2f3e","surface-variant": "#e2e1f4","on-tertiary-fixed": "#291800",
        "on-surface-variant": "#464555","tertiary-container": "#986500","surface": "#fbf8ff",
        "tertiary": "#774f00","on-primary": "#ffffff","secondary-fixed": "#5efae4",
        "on-secondary-fixed-variant": "#005047","surface-tint": "#4948de","on-secondary": "#ffffff",
        "surface-bright": "#fbf8ff","surface-container": "#eeecff","secondary-fixed-dim": "#36ddc8",
        "on-tertiary-container": "#fff2e5","on-secondary-container": "#007165","tertiary-fixed-dim": "#ffba4b",
        "on-primary-fixed-variant": "#2e29c6","error": "#ba1a1a","surface-container-high": "#e8e6fa",
        "surface-container-highest": "#e2e1f4","tertiary-fixed": "#ffddb1","surface-container-low": "#f4f2ff",
        "on-surface": "#191a28","on-error": "#ffffff","secondary": "#006b5f","primary-container": "#5b5bf0",
        "on-error-container": "#93000a","primary": "#413fd6","inverse-primary": "#c1c1ff",
        "surface-dim": "#d9d8ec","error-container": "#ffdad6","surface-container-lowest": "#ffffff",
        "outline-variant": "#c7c4d7","background": "#fbf8ff","primary-fixed": "#e1dfff",
        "on-tertiary-fixed-variant": "#624000"
      },
      borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
      spacing: { "nav-width": "72px", lg: "40px", gutter: "24px", xl: "64px", base: "4px", sm: "16px", xs: "8px", md: "24px" },
      fontFamily: { "display-hero": ["Geist"], "section-header": ["Geist"], "kpi-numeric": ["Space Grotesk"], "headline-lg": ["Geist"], "body-md": ["Inter"], "label-caps": ["Space Grotesk"] },
      fontSize: { "display-hero": ["56px",{"lineHeight":"64px","letterSpacing":"-0.02em","fontWeight":"700"}], "section-header": ["24px",{"lineHeight":"32px","fontWeight":"600"}], "kpi-numeric": ["20px",{"lineHeight":"24px","letterSpacing":"0.02em","fontWeight":"600"}], "headline-lg": ["40px",{"lineHeight":"48px","letterSpacing":"-0.01em","fontWeight":"700"}], "body-md": ["15px",{"lineHeight":"24px","fontWeight":"400"}], "label-caps": ["12px",{"lineHeight":"16px","letterSpacing":"0.05em","fontWeight":"700"}] }

  }

<style>
body { background-color:#fbf8ff; background-image: radial-gradient(at 0% 0%, rgba(65,63,214,0.05) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(0,107,95,0.05) 0px, transparent 50%); min-height:100vh; }
.glass-panel { background: rgba(255,255,255,0.6); backdrop-filter: blur(12px); border: 1px solid rgba(231,233,245,1); transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
.glass-panel:hover { background: rgba(255,255,255,0.8); }
.agent-card { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); cursor: grab; }
.agent-card:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -8px rgba(65,63,214,0.15); }
.agent-card:active { cursor: grabbing; }
.agent-card.dragging { opacity: 0.5; transform: scale(0.95); }
.agent-card.drag-over { border-color: #413fd6; box-shadow: 0 0 0 2px #413fd6; }
.shimmer-btn { position: relative; overflow: hidden; background: linear-gradient(135deg,#5B5BF0,#7C7CFA); transition: all 0.3s ease; }
.shimmer-btn:hover::after { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:linear-gradient(45deg,transparent,rgba(255,255,255,0.3),transparent); transform:rotate(45deg); animation:shimmer 1s ease-in-out; }
@keyframes shimmer { 0% { transform:translate(-100%,-100%) rotate(45deg); } 100% { transform:translate(100%,100%) rotate(45deg); } }
.status-glow-primary { animation: pulse-primary 2s infinite ease-in-out; }
.status-glow-secondary { animation: pulse-secondary 2s infinite ease-in-out; }
@keyframes pulse-primary { 0% { box-shadow:0 0 0 0 rgba(65,63,214,0.4); } 70% { box-shadow:0 0 0 8px rgba(65,63,214,0); } 100% { box-shadow:0 0 0 0 rgba(65,63,214,0); } }
@keyframes pulse-secondary { 0% { box-shadow:0 0 0 0 rgba(0,107,95,0.4); } 70% { box-shadow:0 0 0 8px rgba(0,107,95,0); } 100% { box-shadow:0 0 0 0 rgba(0,107,95,0); } }
.kpi-tile { transition: all 0.2s ease; }
.kpi-tile:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(65,63,214,0.1); }
.custom-scrollbar::-webkit-scrollbar { width:4px; }
.custom-scrollbar::-webkit-scrollbar-track { background:transparent; }
.custom-scrollbar::-webkit-scrollbar-thumb { background:#c7c4d7; border-radius:10px; }
.drawer-backdrop { position:fixed; inset:0; z-index:60; background:rgba(25,26,40,0.32); opacity:0; transition:opacity .3s ease; }
.drawer-backdrop.open { opacity:1; }
.glass-drawer { background: rgba(255,255,255,0.8); backdrop-filter: blur(24px); border-left: 1px solid #E7E9F5; }
.drawer-enter { transform:translateX(100%); opacity:0; }
.drawer-enter-active { transform:translateX(0); opacity:1; transition:transform .3s ease, opacity .3s ease; }
.drawer-exit { transform:translateX(0); opacity:1; }
.drawer-exit-active { transform:translateX(100%); opacity:0; transition:transform .3s ease, opacity .3s ease; }
.modal-backdrop { position:fixed; inset:0; z-index:100; background:rgba(25,26,40,0.36); display:flex; align-items:center; justify-content:center; padding:18px; opacity:0; transition:opacity .25s ease; }
.modal-backdrop.open { opacity:1; }
.modal-card { width:min(600px,calc(100vw - 32px)); max-height:min(80vh,600px); overflow-y:auto; border-radius:18px; border:1px solid rgba(199,196,215,0.72); background:rgba(255,255,255,0.96); box-shadow:0 30px 90px rgba(25,26,40,0.28); padding:20px; transform:scale(0.95); transition:transform .25s ease; }
.modal-backdrop.open .modal-card { transform:scale(1); }
.drop-zone { min-height: 120px; transition: all 0.2s ease; }
</style>
</head>
<body class="font-body-md text-on-surface antialiased">
<main class="pt-24 pb-16 px-md max-w-screen-2xl mx-auto">
<div class="flex justify-between items-end mb-md">
<div>
<h1 class="font-headline-lg text-headline-lg text-primary mb-xs">Mission Control</h1>
<p class="text-on-surface-variant font-body-md max-w-xl">Orchestrate your autonomous industrial agents with real-time monitoring and control.</p>
</div>
<div class="flex items-center gap-md">
<div class="relative"><span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">search</span><input class="w-56 bg-white/70 border border-outline-variant/40 rounded-full py-2 pl-10 pr-4 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none text-sm" id="ym-search-input" placeholder="Search agents..."/></div>
<button class="shimmer-btn text-on-primary px-6 py-2.5 rounded-full font-label-caps text-sm flex items-center gap-xs shadow-lg" id="ym-new-mission-btn"><span class="material-symbols-outlined text-[18px]">add</span> NEW MISSION</button>
</div>
</div>
<div class="grid grid-cols-6 gap-gutter mb-xl" id="ym-kpi-row">
<div class="kpi-tile glass-panel rounded-xl p-md"><span class="font-label-caps text-[10px] text-on-surface-variant">ACTIVE AGENTS</span><div class="font-kpi-numeric text-2xl text-primary mt-1" id="ym-kpi-active">0</div></div>
<div class="kpi-tile glass-panel rounded-xl p-md"><span class="font-label-caps text-[10px] text-on-surface-variant">RUNNING MISSIONS</span><div class="font-kpi-numeric text-2xl text-secondary mt-1" id="ym-kpi-running">0</div></div>
<div class="kpi-tile glass-panel rounded-xl p-md"><span class="font-label-caps text-[10px] text-on-surface-variant">AWAITING APPROVAL</span><div class="font-kpi-numeric text-2xl text-tertiary mt-1" id="ym-kpi-awaiting">0</div></div>
<div class="kpi-tile glass-panel rounded-xl p-md"><span class="font-label-caps text-[10px] text-on-surface-variant">COMPLETED TODAY</span><div class="font-kpi-numeric text-2xl text-on-surface mt-1" id="ym-kpi-completed">0</div></div>
<div class="kpi-tile glass-panel rounded-xl p-md"><span class="font-label-caps text-[10px] text-on-surface-variant">AVG EFFICIENCY</span><div class="font-kpi-numeric text-2xl text-primary mt-1" id="ym-kpi-efficiency">0%</div></div>
<div class="kpi-tile glass-panel rounded-xl p-md"><span class="font-label-caps text-[10px] text-on-surface-variant">AI SUCCESS RATE</span><div class="font-kpi-numeric text-2xl text-secondary mt-1" id="ym-kpi-success">0%</div></div>
</div>
<div class="flex items-center gap-xs flex-wrap mb-sm" id="ym-active-filters"></div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-gutter" id="ym-columns-container">
<div class="flex flex-col gap-sm" data-status="active">
<div class="flex items-center justify-between px-xs mb-2"><span class="font-label-caps text-primary flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-primary status-glow-primary"></span>RUNNING</span><span class="bg-primary/10 px-2 py-0.5 rounded text-[10px] font-bold text-primary" id="ym-count-active">0</span></div>
<div class="drop-zone flex flex-col gap-sm" id="ym-drop-active"></div>
</div>
<div class="flex flex-col gap-sm" data-status="paused">
<div class="flex items-center justify-between px-xs mb-2"><span class="font-label-caps text-tertiary flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-tertiary"></span>AWAITING APPROVAL</span><span class="bg-tertiary/10 px-2 py-0.5 rounded text-[10px] font-bold text-tertiary" id="ym-count-paused">0</span></div>
<div class="drop-zone flex flex-col gap-sm" id="ym-drop-paused"></div>
</div>
<div class="flex flex-col gap-sm" data-status="done">
<div class="flex items-center justify-between px-xs mb-2"><span class="font-label-caps text-on-surface-variant flex items-center gap-2"><span class="material-symbols-outlined text-sm">check_circle</span>COMPLETED</span><span class="bg-surface-container-high px-2 py-0.5 rounded text-[10px] font-bold text-on-surface-variant" id="ym-count-done">0</span></div>
<div class="drop-zone flex flex-col gap-sm" id="ym-drop-done"></div>
</div>
</div>
</main>
<div class="drawer-backdrop" id="ym-drawer-backdrop"></div>
<div class="fixed top-16 bottom-0 w-[500px] glass-drawer z-30 flex flex-col shadow-[-10px_0_40px_rgba(65,63,214,0.08)] drawer-enter" id="ym-agent-drawer" style="display:none;right:var(--sidebar-width)">
<div class="p-md flex justify-between items-center border-b border-outline-variant/20 shrink-0">
<h2 class="font-section-header text-lg text-on-surface" id="ym-drawer-title">Agent Details</h2>
<button class="p-2 hover:bg-primary/10 rounded-full transition-all" id="ym-drawer-close"><span class="material-symbols-outlined">close</span></button>
</div>
<div class="flex-grow overflow-y-auto custom-scrollbar p-md space-y-md" id="ym-drawer-body">
<div id="ym-drawer-content"></div>
</div>
</div>
<div id="ym-toast-container" class="fixed top-24 left-1/2 -translate-x-1/2 z-[120] flex flex-col items-center gap-2 pointer-events-none"></div>
<script src="/js/agents.js" defer></script>
<script src="/js/app-shell.js" defer></script>
</body></html>
