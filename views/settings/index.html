<!DOCTYPE html>

<html class="light" lang="en"><head>

                    "surface-dim": "#d9d8ec",
                    "error-container": "#ffdad6",

    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid #E7E9F5;
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid #E7E9F5;
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            outline: none;
            border-color: #413fd6;
            box-shadow: 0 0 4px rgba(65, 63, 214, 0.3);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #5B5BF0 0%, #7C7CFA 100%);
        }
        .shimmer-btn {
            position: relative;
            overflow: hidden;
        }
        .shimmer-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: rotate(45deg);
            transition: all 0.5s ease;
            opacity: 0;
        }
        .shimmer-btn:hover::after {
            opacity: 1;
            left: 100%;
        }
        .facility-chip.selected {
            border-color: #413fd6 !important;
            background: rgba(65, 63, 214, 0.1) !important;
            box-shadow: 0 0 0 2px rgba(65, 63, 214, 0.2);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c7c4d7; border-radius: 10px; }
        body {
            background: radial-gradient(circle at 10% 20%, rgba(91, 91, 240, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 90% 80%, rgba(0, 107, 95, 0.03) 0%, transparent 50%),
                        #fbf8ff;
            min-height: 100vh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="font-body-md text-on-surface">
<!-- TopNavBar -->
<header class="fixed top-0 w-full h-16 z-50 bg-white/70 backdrop-blur-md border-b border-outline-variant/30 shadow-[0_8px_32px_0_rgba(65,63,214,0.1)] flex justify-between items-center px-md">
<div class="flex items-center gap-md">
<img src="/assets/logos/logo.svg" alt="YantraMitra" class="h-8 md:h-9"/>
<div class="hidden md:flex items-center space-x-md ml-xl">
<nav class="flex space-x-md font-body-md text-body-md">
<a class="text-on-surface-variant font-medium hover:bg-primary/10 transition-colors px-3 py-1 rounded-lg" href="/assets">Assets</a>
<a class="text-on-surface-variant font-medium hover:bg-primary/10 transition-colors px-3 py-1 rounded-lg" href="/reliability">Reports</a>
<a class="text-primary font-bold border-b-2 border-primary px-3 py-1" href="/settings">Settings</a>
</nav>
</div>
</div>
<div class="flex items-center gap-sm">
<div class="relative flex items-center">
<input class="glass-input rounded-full py-2 px-4 pl-10 w-64 text-body-md focus-within:ring-2 focus-within:ring-primary/50 transition-all" placeholder="Search (⌘K)" type="text"/>
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant">search</span>
</div>
<button class="p-2 rounded-full hover:bg-primary/10 transition-colors text-on-surface-variant">
<span class="material-symbols-outlined">notifications</span>
</button>
              <div class="w-10 h-10 rounded-full border border-primary/20 overflow-hidden relative" id="ym-nav-avatar-container">
<img class="w-full h-full object-cover" id="ym-nav-avatar" src="/assets/images/ym-operator-avatar.jpg" alt="User" onerror="this.style.display='none';document.getElementById('ym-nav-avatar-fallback').style.display='flex'">
<div id="ym-nav-avatar-fallback" class="absolute inset-0 bg-primary/10 text-primary font-bold flex items-center justify-center text-sm" style="display:none">YM</div>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pb-md px-md max-w-5xl mx-auto">
<div class="mb-sm">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-1">Account Settings</h1>
<p class="text-on-surface-variant">Manage your industrial operations identity and system preferences.</p>
</div>
<!-- Tab Interface -->
<div class="flex gap-sm mb-sm overflow-x-auto pb-1 scrollbar-hide">
<button class="px-md py-2.5 rounded-full bg-primary text-on-primary shadow-lg shadow-primary/20 font-medium whitespace-nowrap">Profile</button>
<button class="px-md py-2.5 rounded-full glass-card hover:bg-white transition-colors text-on-surface-variant font-medium whitespace-nowrap">Notifications</button>
<button class="px-md py-2.5 rounded-full glass-card hover:bg-white transition-colors text-on-surface-variant font-medium whitespace-nowrap">Team &amp; Roles</button>
<button class="px-md py-2.5 rounded-full glass-card hover:bg-white transition-colors text-on-surface-variant font-medium whitespace-nowrap">Integrations</button>
<button class="px-md py-2.5 rounded-full glass-card hover:bg-white transition-colors text-on-surface-variant font-medium whitespace-nowrap">Security</button>
</div>
<!-- Content Bento Grid - dynamically populated by JS -->
<div class="grid grid-cols-1 md:grid-cols-12 gap-sm" id="ym-settings-content"></div>
</main>
<!-- Footer -->
<footer class="w-full py-md border-t border-outline-variant/20 bg-transparent">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center px-md gap-sm">
<span class="font-label-caps text-label-caps text-on-surface-variant">© 2024 YantraMitra Platform. All rights reserved.</span>
<div class="flex gap-md font-body-md text-body-md">
<a class="text-on-surface-variant hover:text-primary transition-colors" href="/sitemap">Sitemap</a>
<a class="text-on-surface-variant hover:text-primary transition-colors" href="/privacy">Privacy</a>
<a class="text-on-surface-variant hover:text-primary transition-colors" href="/terms">Terms</a>
<a class="text-on-surface-variant hover:text-primary transition-colors" href="/api-status">API Status</a>
</div>
</div>
</footer>
<!-- Background Atmospheric Elements -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-[20%] left-[-5%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[10%] right-[-10%] w-[30%] h-[30%] bg-secondary-fixed/5 rounded-full blur-[100px]"></div>
</div>
<script>
        // Micro-interactions
        document.querySelectorAll('.glass-input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Search shortcut visual
        window.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                document.querySelector('input[type="text"]').focus();
            }
        });
    </script>
<script src="/js/settings.js" defer></script>
<script src="/js/app-shell.js" defer></script>
</body></html>
