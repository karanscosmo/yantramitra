<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>YantraMitra | AI Operations Console</title>
<link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&family=Geist:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
tailwind.config = { darkMode: "class", theme: { extend: { "colors": { "on-primary-fixed": "#09006b","on-tertiary": "#ffffff","primary-fixed-dim": "#c1c1ff","secondary-container": "#5efae4","on-background": "#191a28","outline": "#767586","on-primary-container": "#f6f2ff","inverse-on-surface": "#f1efff","on-secondary-fixed": "#00201c","inverse-surface": "#2e2f3e","surface-variant": "#e2e1f4","on-tertiary-fixed": "#291800","on-surface-variant": "#464555","tertiary-container": "#986500","surface": "#fbf8ff","tertiary": "#774f00","on-primary": "#ffffff","secondary-fixed": "#5efae4","on-secondary-fixed-variant": "#005047","surface-tint": "#4948de","on-secondary": "#ffffff","surface-bright": "#fbf8ff","surface-container": "#eeecff","secondary-fixed-dim": "#36ddc8","on-tertiary-container": "#fff2e5","on-secondary-container": "#007165","tertiary-fixed-dim": "#ffba4b","on-primary-fixed-variant": "#2e29c6","error": "#ba1a1a","surface-container-high": "#e8e6fa","surface-container-highest": "#e2e1f4","tertiary-fixed": "#ffddb1","surface-container-low": "#f4f2ff","on-surface": "#191a28","on-error": "#ffffff","secondary": "#006b5f","primary-container": "#5b5bf0","on-error-container": "#93000a","primary": "#413fd6","inverse-primary": "#c1c1ff","surface-dim": "#d9d8ec","error-container": "#ffdad6","surface-container-lowest": "#ffffff","outline-variant": "#c7c4d7","background": "#fbf8ff","primary-fixed": "#e1dfff","on-tertiary-fixed-variant": "#624000" }, "borderRadius": { "DEFAULT": "0.25rem","lg": "0.5rem","xl": "0.75rem","full": "9999px" }, "fontFamily": { "display-hero": ["Geist"],"section-header": ["Geist"],"kpi-numeric": ["Space Grotesk"],"headline-lg": ["Geist"],"body-md": ["Inter"],"headline-lg-mobile": ["Geist"],"label-caps": ["Space Grotesk"] }, "fontSize": { "display-hero": ["56px", {"lineHeight": "64px", "letterSpacing": "-0.02em", "fontWeight": "700"}],"section-header": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],"kpi-numeric": ["20px", {"lineHeight": "24px", "letterSpacing": "0.02em", "fontWeight": "600"}],"headline-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.01em", "fontWeight": "700"}],"body-md": ["15px", {"lineHeight": "24px", "fontWeight": "400"}],"headline-lg-mobile": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],"label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}] } }, } }
</script>
<style>
.glass-panel { background: rgba(255,255,255,0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid #E7E9F5; }
.glass-dark { background: rgba(25,26,40,0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(199,196,215,0.15); }
.shimmer-btn { position: relative; overflow: hidden; background: linear-gradient(135deg, #5B5BF0, #7C7CFA); transition: all 0.3s ease; }
.shimmer-btn:hover::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent); transform: rotate(45deg); animation: shimmer 1s ease-in-out; }
@keyframes shimmer { 0% { transform: translate(-100%, -100%) rotate(45deg); } 100% { transform: translate(100%, 100%) rotate(45deg); } }
.chat-scroll::-webkit-scrollbar { width: 6px; }
.chat-scroll::-webkit-scrollbar-track { background: transparent; }
.chat-scroll::-webkit-scrollbar-thumb { background: rgba(65,63,214,0.15); border-radius: 10px; }
.chat-scroll::-webkit-scrollbar-thumb:hover { background: rgba(65,63,214,0.3); }
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
.msg-enter { animation: msgSlideIn .3s ease; }
@keyframes msgSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.ym-pill { padding: 8px 18px; border-radius: 9999px; font-size: 13px; font-weight: 700; white-space: nowrap; letter-spacing: 0.03em; }
.animate-bounce-dot { animation: bounceDot 1.4s infinite ease-in-out both; }
@keyframes bounceDot { 0%,80%,100% { transform: scale(0.6); } 40% { transform: scale(1); } }
.modal-backdrop { position: fixed; inset: 0; z-index: 100; background: rgba(25,26,40,0.36); display: flex; align-items: center; justify-content: center; padding: 18px; }
.modal-card { width: min(680px, calc(100vw - 32px)); max-height: min(80vh, 680px); overflow-y: auto; border-radius: 18px; border: 1px solid rgba(199,196,215,0.72); background: rgba(255,255,255,0.96); box-shadow: 0 30px 90px rgba(25,26,40,0.28); padding: 20px; }
@media (max-width: 768px) { .chat-container { padding-left: 8px; padding-right: 8px; } }
pre code { font-size: 12px; line-height: 1.5; }
.ym-mic-active { color: #ba1a1a; animation: micPulse 1s infinite; }
@keyframes micPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>
</head>
<body class="bg-background text-on-background font-body-md overflow-hidden min-h-screen">
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[400px] h-[400px] bg-secondary/5 blur-[100px] rounded-full"></div>
</div>
<main class="pt-4 pr-0 pl-0 h-screen flex flex-col">
<div class="flex items-center gap-3 px-6 py-3 border-b border-outline-variant/20 shrink-0">
  <img src="/assets/images/yantranklan-avatar-ai.jpg" alt="YantraNklan" class="w-14 h-14 rounded-full border-2 border-secondary/40"/>
  <div class="flex-1 min-w-0">
    <div class="flex items-center gap-3">
      <h2 class="font-bold text-on-surface truncate" style="font-size:42px;font-family:Geist,sans-serif;letter-spacing:-0.02em;line-height:1.1">YantraNklan</h2>
      <span class="w-2.5 h-2.5 rounded-full bg-secondary status-pulse-teal" id="ym-ai-status-dot"></span>
      <span class="text-xs text-on-surface-variant font-semibold" id="ym-ai-status">Online</span>
    </div>
    <p class="text-lg text-on-surface-variant truncate mt-0.5" style="font-size:18px">AI Operations Agent — YantraMitra Industrial Copilot</p>
  </div>
  <button class="text-sm text-on-surface-variant hover:text-primary px-4 py-2 rounded-full border border-outline-variant/30 hover:border-primary/50 transition-all" id="ym-clear-chat" title="Clear conversation">
    <span class="material-symbols-outlined align-middle" style="font-size:20px">delete_sweep</span> Clear
  </button>
</div>
<section class="flex-1 overflow-y-auto chat-scroll px-8 py-5 space-y-5" id="ym-chat-messages"></section>
<section class="shrink-0 pb-4 pt-2 px-8">
  <div class="flex gap-2 mb-3 overflow-x-auto no-scrollbar" id="ym-suggested-pills"></div>
  <div class="glass-panel rounded-2xl p-1.5 flex items-end gap-1.5 shadow-lg border-primary/10" id="ym-input-area">
    <label class="material-symbols-outlined text-on-surface-variant p-2.5 hover:bg-surface-container rounded-lg transition-colors cursor-pointer shrink-0" id="ym-attach-btn" title="Attach file" style="font-size:24px">attach_file</label>
    <input type="file" id="ym-file-input" class="hidden" multiple accept=".pdf,.csv,.xlsx,.xls,.txt,.log,.md,.jpg,.jpeg,.png,.svg"/>
    <div class="flex-1 flex flex-col min-w-0">
      <div id="ym-file-preview" class="hidden flex gap-1.5 flex-wrap mb-1 px-1"></div>
      <input class="w-full bg-transparent border-none outline-none text-lg px-2" id="ym-chat-input" placeholder="Ask YantraNklan about your operations..." type="text" autofocus style="font-size:18px;padding-top:18px;padding-bottom:18px"/>
    </div>
    <div class="flex items-center gap-1 shrink-0 pr-1">
      <button class="material-symbols-outlined text-on-surface-variant p-2.5 hover:bg-surface-container rounded-lg transition-colors relative" id="ym-mic-btn" title="Voice input" style="font-size:26px">mic</button>
      <button class="bg-primary-container text-on-primary-container p-3 rounded-xl hover:scale-105 active:scale-95 transition-all shimmer-btn disabled:opacity-40 disabled:cursor-not-allowed" id="ym-send-btn" disabled>
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;font-size:22px">send</span>
      </button>
      <button class="hidden bg-tertiary text-white p-3 rounded-xl hover:scale-105 active:scale-95 transition-all" id="ym-cancel-btn">
        <span class="material-symbols-outlined" style="font-size:22px">stop</span>
      </button>
    </div>
  </div>
  <p class="text-center text-xs text-on-surface-variant/50 mt-2 font-medium">YantraMitra AI · Responses use live plant data</p>
</section>
</main>
<div id="ym-toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 glass-panel rounded-full py-2.5 px-5 flex items-center gap-2.5 translate-y-32 opacity-0 transition-all duration-500 z-[100] shadow-lg border border-outline-variant/30">
<span class="material-symbols-outlined text-secondary text-sm">check_circle</span>
<span class="font-bold text-sm text-on-surface" id="ym-toast-msg"></span>
</div>
<script src="/js/ai-console.js" defer></script>
<script src="/js/app-shell.js" defer></script>
</body></html>
